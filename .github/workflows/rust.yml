name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    # Only build the core library and CLI binary. The Tauri GUI crate
    # (crates/polariseq-gui/src-tauri) requires GTK/webkit2gtk system libs
    # and a prebuilt frontend (../dist) that are not available in this job;
    # it is built separately on platforms with the proper Tauri prerequisites.
    - name: Build
      run: cargo build --verbose -p polariseq-core -p polariseq-cli
    - name: Run tests
      run: cargo test --verbose -p polariseq-core -p polariseq-cli
